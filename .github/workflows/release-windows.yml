# DefectLoop Studio — Windows 安装包构建与 GitHub Release（仅 Windows）
name: Release Windows

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0），留空则用 version.txt'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 更新版本号（手动触发）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: echo "${{ github.event.inputs.version }}" > version.txt
        shell: bash

      - name: 构建前端
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: 构建 Windows 包
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          .\packaging\build.ps1

      - name: 读取版本号
        id: version
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DefectLoop Studio ${{ steps.version.outputs.VERSION }} (Windows)
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
